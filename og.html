<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;background:#0a0a0c;color:#f4f4f5;
    font-family:Inter,-apple-system,system-ui,sans-serif;padding:72px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .eyebrow{font-size:18px;letter-spacing:.2em;text-transform:uppercase;color:#6a6a73;font-weight:700}
  h1{font-size:128px;letter-spacing:-.03em;font-weight:600;line-height:1;margin:0}
  h1 .dot{color:#6a6a73}
  .tag{font-size:40px;font-weight:500;letter-spacing:-.02em;margin-top:18px}
  .row{display:flex;align-items:center;justify-content:space-between}
  .dots{display:flex;gap:12px}
  .dots i{width:34px;height:34px;border-radius:50%;display:block}
  .foot{font-size:20px;color:#9a9aa3}
</style></head><body>
  <div><p class="eyebrow">Design systems for AI builders</p></div>
  <div>
    <h1>design<span class="dot">.</span>md</h1>
    <p class="tag">Taste, as a file your agent can read.</p>
  </div>
  <div class="row">
    <span class="foot">256 design systems · browse, copy, build</span>
    <span class="dots">
      <i style="background:#cc785c"></i><i style="background:#5865F2"></i>
      <i style="background:#FF9900"></i><i style="background:#00B871"></i>
      <i style="background:#e60023"></i><i style="background:#70FFAF"></i>
    </span>
  </div>
</body></html>
